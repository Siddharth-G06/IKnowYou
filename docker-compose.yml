version: "3.9"
services:
  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/iknow_you_local
      NEO4J_server_memory_heap_initial__size: "64m"
      NEO4J_server_memory_heap_max__size: "128m"
      NEO4J_server_memory_pagecache_size: "32m"
    volumes:
      - ./neo4j_data:/data
    restart: unless-stopped
